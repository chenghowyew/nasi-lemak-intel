<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasi Lemak Intel - Admin Mode</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        #map { flex-grow: 1; width: 100%; }
        
        /* The Submission Tray */
        .tray { 
            padding: 20px; background: white; border-top: 2px solid #ddd; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1); display: none; 
        }
        .controls { padding: 15px; background: #f4f4f4; border-bottom: 1px solid #ddd; }
        input, button, textarea { width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #d35400; color: white; font-weight: bold; border: none; cursor: pointer; }
        .btn-secondary { background: #34495e; }
        .custom-tooltip { background: #d35400; color: #fff; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="toggleTray()">+ Add New Stall Now</button>
    </div>

    <div id="map"></div>

    <div id="submissionTray" class="tray">
        <h3 style="margin-top:0">Register New Stall</h3>
        
        <p style="font-size: 12px; color: #666;">Step 1: Search for the location</p>
        <input type="text" id="searchAddress" placeholder="Type Stall Name or Address..." oninput="searchLocation(this.value)">
        
        <div id="searchResults" style="background: #eee; max-height: 150px; overflow-y: auto; margin-bottom: 10px; border-radius: 5px;"></div>
    
        <p style="font-size: 12px; color: #666;">Step 2: Verify & Name</p>
        <input type="text" id="stallName" placeholder="Confirmed Name (e.g. 'Auntie's Nasi Lemak')">
        <textarea id="stallDesc" placeholder="What's good here?"></textarea>
        
        <input type="hidden" id="stallLat">
        <input type="hidden" id="stallLng">
    
        <button onclick="submitToSupabase()">🚀 Confirm & Register</button>
        <button class="btn-secondary" onclick="toggleTray()" style="background:#95a5a6">Cancel</button>
    </div>
    
    <script>
    // --- SMART SEARCH LOGIC ---
    async function searchLocation(query) {
        if (query.length < 3) return; // Don't search until 3 letters typed
        
        const resultsDiv = document.getElementById('searchResults');
        // Using Photon (OpenStreetMap) - Free and no API key needed for testing
        const response = await fetch(`https://photon.komoot.io/api/?q=${query}&lat=1.3521&lon=103.8198`);
        const data = await response.json();
        
        resultsDiv.innerHTML = ''; // Clear old results
        
        data.features.forEach(feature => {
            const name = feature.properties.name || '';
            const street = feature.properties.street || '';
            const fullAddress = `${name} ${street}`.trim();
            
            const div = document.createElement('div');
            div.style.padding = '10px';
            div.style.borderBottom = '1px solid #ddd';
            div.style.cursor = 'pointer';
            div.innerText = fullAddress;
            
            div.onclick = () => {
                document.getElementById('stallName').value = name;
                document.getElementById('stallLat').value = feature.geometry.coordinates[1];
                document.getElementById('stallLng').value = feature.geometry.coordinates[0];
                document.getElementById('searchAddress').value = fullAddress;
                resultsDiv.innerHTML = ''; // Hide results
                alert("Location locked in!");
            };
            resultsDiv.appendChild(div);
        });
    }
    </script>




    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- 1. CONFIGURATION ---
        const SUPABASE_URL = 'https://jhbnokxiymyakodcqqeq.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpoYm5va3hpeW15YWtvZGNxcWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MjI2OTQsImV4cCI6MjA4ODA5ODY5NH0.VjRKwTlXKmcVgHLmmEle0TfpNCTFhb6mkFYOGpsOKQI';  

        var map = L.map('map').setView([1.3521, 103.8198], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var markerGroup = L.layerGroup().addTo(map);

        // --- 2. LOAD DATA FROM SUPABASE ---
        async function loadData() {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/stalls?select=*`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const stalls = await response.json();
            
            markerGroup.clearLayers();
            stalls.forEach(stall => {
                var m = L.marker([stall.lat, stall.lng]).addTo(markerGroup);
                m.bindPopup(`<b>${stall.name}</b><br>${stall.description}`);
                m.bindTooltip(stall.name, { permanent: false, className: 'custom-tooltip' });
            });
        }

        // --- 3. SUBMIT DATA TO SUPABASE ---
        async function submitToSupabase() {
            const newStall = {
                name: document.getElementById('stallName').value,
                description: document.getElementById('stallDesc').value,
                lat: parseFloat(document.getElementById('stallLat').value),
                lng: parseFloat(document.getElementById('stallLng').value)
            };

            const response = await fetch(`${SUPABASE_URL}/rest/v1/stalls`, {
                method: 'POST',
                headers: { 
                    'apikey': SUPABASE_KEY, 
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=representation'
                },
                body: JSON.stringify(newStall)
            });

            if (response.ok) {
                alert("Success! Stall added to live database.");
                toggleTray();
                loadData(); // Refresh the map instantly
            } else {
                alert("Error submitting stall.");
            }
        }

        // --- 4. UTILITIES ---
        function toggleTray() {
            const tray = document.getElementById('submissionTray');
            tray.style.display = tray.style.display === 'block' ? 'none' : 'block';
        }

        function captureGPS() {
            navigator.geolocation.getCurrentPosition(pos => {
                document.getElementById('stallLat').value = pos.coords.latitude;
                document.getElementById('stallLng').value = pos.coords.longitude;
            });
        }

        loadData(); // Initial load
    </script>
</body>
</html>
